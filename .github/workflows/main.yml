name: Daily Congressional Trade Watch

on:
  schedule:
    # Runs daily at 13:17 UTC.
    # (6:17 AM Pacific during daylight time, 5:17 AM Pacific during standard time.)
    # GitHub Actions cron is UTC and can be delayed/dropped around minute 0 under heavy load,
    # so we avoid top-of-hour scheduling.
    - cron: '17 13 * * *'
  workflow_dispatch:

jobs:
  run-scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env from secrets
        run: |
          cat > .env <<'ENVEOF'
          FMP_API_KEY=${{ secrets.FMP_API_KEY }}
          DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}
          LOG_LEVEL=INFO
          REQUEST_TIMEOUT_SECONDS=20
          MAX_RETRIES=3
          ENVEOF

      - name: Run daily scan
        run: python -m src.main run
